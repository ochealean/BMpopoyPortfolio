<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BM Popoy Portfolio Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7dc 0%, #c8ddb0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-container {
            max-width: 480px;
            width: 100%;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .login-card {
            background: white;
            border-radius: 36px;
            padding: 44px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        .logo-badge {
            background: linear-gradient(135deg, #5A8010, #8BC525);
            width: 70px;
            height: 70px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 2rem;
            box-shadow: 0 8px 20px rgba(90, 128, 16, 0.3);
        }
        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.9rem;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #5b6e8c;
            font-size: 0.9rem;
            margin-bottom: 32px;
            border-bottom: 1px solid #eef2f0;
            display: inline-block;
            padding-bottom: 6px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: #334155;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
        }
        .input-field {
            position: relative;
        }
        .input-field input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: #fcfdfe;
        }
        .input-field input:focus {
            outline: none;
            border-color: #8BC525;
            box-shadow: 0 0 0 3px rgba(139, 197, 37, 0.2);
            background: white;
        }
        .login-btn {
            background: linear-gradient(135deg, #5A8010, #8BC525);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(90, 128, 16, 0.3);
        }
        .demo-credentials {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-top: 28px;
            font-size: 0.8rem;
            color: #475569;
            border: 1px solid #e2edcf;
        }
        .demo-credentials p {
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e2f;
        }
        .demo-credentials code {
            background: #eef2f0;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            margin: 4px 4px;
            font-family: monospace;
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        .error-msg.show {
            display: flex;
        }
        .footer-note {
            margin-top: 24px;
            font-size: 0.7rem;
            color: #6c7a91;
        }
        @media (max-width: 500px) {
            .login-card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="logo-badge">
            <i class="fas fa-leaf"></i>
        </div>
        <h1>BM Popoy</h1>
        <div class="subtitle">Content Manager · Admin Portal</div>

        <div id="errorMsg" class="error-msg">
            <i class="fas fa-exclamation-triangle"></i> <span id="errorText"></span>
        </div>

        <form id="loginForm" action="javascript:void(0);">
            <div class="input-group">
                <label><i class="fas fa-envelope" style="margin-right: 6px;"></i> Email / Username</label>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="admin@bmpopoy.ph" autocomplete="off" value="admin@bmpopoy.ph">
                </div>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-field">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="••••••••" value="admin123">
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-arrow-right-to-bracket"></i> Sign In to Dashboard
            </button>
        </form>

        <div class="demo-credentials">
            <p><i class="fas fa-flask"></i> Demo Credentials (pre-filled)</p>
            <code>📧 admin@bmpopoy.ph</code> <code>🔒 admin123</code>
            <div style="margin-top: 10px; font-size: 0.7rem;">Click Sign In — secure localStorage session</div>
        </div>
        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> Authorized personnel only
        </div>
    </div>
</div>

<script>
    (async () => {
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const username = document.getElementById('username');
        const password = document.getElementById('password');

        try {
            const response = await fetch('/api/admin-auth', { credentials: 'include' });
            const session = await response.json();
            if (session && session.authenticated === true) {
                window.location.replace('./admin.html');
                return;
            }
        } catch {
            // stay on login page
        }

        if (!loginForm) return;

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            if (errorMsg) errorMsg.classList.remove('show');
            if (loginBtn) loginBtn.disabled = true;

            try {
                const response = await fetch('/api/admin-auth', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: username ? username.value.trim() : '',
                        password: password ? password.value : ''
                    })
                });

                const payload = await response.json();

                if (!response.ok) {
                    throw new Error(payload && payload.error ? payload.error : 'Login failed');
                }

                window.location.replace('./admin.html');
            } catch (error) {
                if (errorText) errorText.textContent = error.message || 'Login failed';
                if (errorMsg) errorMsg.classList.add('show');
            } finally {
                if (loginBtn) loginBtn.disabled = false;
            }
        });
    })();
</script>


</body>
</html>
